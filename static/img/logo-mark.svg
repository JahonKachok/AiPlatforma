<svg xmlns="http://www.w3.org/2000/svg" viewBox="22 40 256 198">
  <!-- BuildFlow belgisi — BuildFlow_Platform_Logo.svg dagi ikonkaning fonsiz,
       ixcham varianti (sidebar, login va favicon uchun). -->
  <!-- Ground line -->
  <line x1="30" y1="230" x2="270" y2="230" stroke="#0B3C5D" stroke-width="8" stroke-linecap="round"/>
  <!-- Bars / Buildings -->
  <rect x="55" y="150" width="18" height="80" rx="4" fill="#72C07D"/>
  <rect x="85" y="120" width="18" height="110" rx="4" fill="#72C07D"/>
  <rect x="115" y="100" width="18" height="130" rx="4" fill="#72C07D"/>
  <rect x="145" y="120" width="18" height="110" rx="4" fill="#72C07D"/>
  <rect x="175" y="140" width="18" height="90" rx="4" fill="#72C07D"/>
  <rect x="205" y="110" width="18" height="120" rx="4" fill="#72C07D"/>
  <rect x="235" y="150" width="18" height="80" rx="4" fill="#72C07D"/>
  <!-- Tech Building Outlines -->
  <path d="M 110,230 L 110,110 L 150,50 L 190,110 L 190,230" fill="none" stroke="#0B3C5D" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 150,50 L 150,230" fill="none" stroke="#0B3C5D" stroke-width="4" stroke-dasharray="8 6"/>
  <!-- Trendline / Automation Flow -->
  <path d="M 45,220 L 100,160 L 150,180 L 255,60" fill="none" stroke="#0B3C5D" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Nodes / Points -->
  <circle cx="100" cy="160" r="10" fill="#0B3C5D"/>
  <circle cx="150" cy="180" r="10" fill="#0B3C5D"/>
  <circle cx="255" cy="60" r="12" fill="#0B3C5D"/>
</svg>
