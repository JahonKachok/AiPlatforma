{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "Delete record" %}{% endblock %}
{% block page_title %}{% trans "Delete record" %}{% endblock %}
{% block content %}
<div class="card max-w-md p-6">
  <p class="mb-4 text-sm">{% trans "Are you sure you want to delete this record?" %}</p>
  <form method="post" class="flex gap-3">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger btn-md">{% trans "Delete" %}</button>
    <a href="{% url 'projects:detail' record.project.pk %}" class="btn btn-secondary btn-md">{% trans "Cancel" %}</a>
  </form>
</div>
{% endblock %}
