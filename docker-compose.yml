services:
  redis:
    image: redis:7-alpine
    container_name: aiplatforma_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - app_network

  web:
    build: .
    container_name: aiplatforma_web
    restart: unless-stopped
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=aiplatforma.settings.prod
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
      - backups_data:/app/backups
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/accounts/login/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  celery-worker:
    build: .
    container_name: aiplatforma_celery_worker
    restart: unless-stopped
    entrypoint: []
    command: celery -A aiplatforma worker --loglevel=info
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=aiplatforma.settings.prod
    volumes:
      - media_data:/app/media
    depends_on:
      - redis
      - web
    networks:
      - app_network

  celery-beat:
    build: .
    container_name: aiplatforma_celery_beat
    restart: unless-stopped
    entrypoint: []
    command: celery -A aiplatforma beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=aiplatforma.settings.prod
    depends_on:
      - redis
      - web
    networks:
      - app_network

  telegram-bot:
    build: .
    container_name: aiplatforma_telegram_bot
    restart: unless-stopped
    entrypoint: []
    command: python manage.py run_telegram_bot
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=aiplatforma.settings.prod
    depends_on:
      - web
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: aiplatforma_nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    ports:
      - "80:80"
    depends_on:
      web:
        condition: service_healthy
    networks:
      - app_network

volumes:
  redis_data:
  media_data:
  static_data:
  backups_data:

networks:
  app_network:
    driver: bridge
